<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #game-container { position: relative; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center;
      background: rgba(0,0,0,0.75); z-index: 100;
    }
    #ui-overlay.active { display: flex; }
    #panel {
      background: #1e1e2e; border: 2px solid #7c6af7;
      border-radius: 16px; padding: 40px; max-width: 640px; width: 90%;
      max-height: 80vh; overflow-y: auto; color: #e0e0f0;
      box-shadow: 0 0 60px rgba(124,106,247,0.3);
      position: relative;
    }
    #panel h2 { font-size: 1.6rem; margin-bottom: 8px; color: #a89cf7; }
    #panel .panel-subtitle { font-size: 0.85rem; color: #7c7c9a; margin-bottom: 24px; letter-spacing: 0.05em; text-transform: uppercase; }
    #panel p, #panel li { font-size: 0.95rem; line-height: 1.7; color: #c0c0d8; margin-bottom: 10px; }
    #panel ul { padding-left: 20px; }
    #panel a { color: #a89cf7; }
    #close-btn {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: #7c7c9a;
      font-size: 1.4rem; cursor: pointer; transition: color 0.2s;
    }
    #close-btn:hover { color: #e0e0f0; }
    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,46,0.9); color: #a89cf7;
      padding: 8px 20px; border-radius: 20px; font-size: 0.8rem;
      pointer-events: none; transition: opacity 0.5s;
      border: 1px solid rgba(124,106,247,0.3);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="ui-overlay">
    <div id="panel">
      <button id="close-btn">&#x2715;</button>
      <h2 id="panel-title">Title</h2>
      <div class="panel-subtitle" id="panel-subtitle">Subtitle</div>
      <div id="panel-body"></div>
    </div>
  </div>

  <div id="hint">WASD or Arrow Keys to move &nbsp;|&nbsp; E or Space to interact</div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="js/content.js"></script>
  <script src="js/Player.js"></script>
  <script src="js/Interactable.js"></script>
  <script src="js/UIManager.js"></script>
  <script src="js/HubScene.js"></script>
  <script src="js/BootScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
